{% extends 'catalog/base.html' %}
{% block content %}
<div class="album py-5 bg-body-tertiary">
    <div class="container">
        <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 g-3"> {% for product in products %}
            <div class="col">
                <div class="card shadow-sm"><img src="{{ product.image.url }}">
                    <div class="card-body"><p class="card-text h5" style="text-align: center">{{ product.name }}</p>
                        <p class="card-text">Описание: {{ product.description|truncatechars:100 }}</p>
                        <div class="d-flex justify-content-between align-items-center">
                            <div class="btn-group"><a class="btn btn-primary"
                                                      href="{% url 'catalog:product_detail' product.pk %}"
                                                      role="button">Посмотреть</a></div>
                            <small class="text-body-secondary">{{ product.created_at|date:"d M Y" }}</small></div>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</div> {% endblock %}
